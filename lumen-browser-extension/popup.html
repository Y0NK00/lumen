<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 260px;
      background: #0f0f11;
      color: #e2e2e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #1e1e2a;
    }

    .header img {
      width: 28px;
      height: 28px;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.01em;
    }

    .header-text p {
      font-size: 11px;
      color: #6b7280;
      margin-top: 1px;
    }

    .status-section {
      padding: 14px 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.connected    { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.disconnected { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
    .dot.checking     { background: #f59e0b; box-shadow: 0 0 6px #f59e0b88; }

    .status-label {
      font-weight: 500;
      color: #d1d5db;
    }

    .status-sub {
      margin-top: 6px;
      font-size: 11px;
      color: #6b7280;
      line-height: 1.5;
      padding-left: 16px;
    }

    .divider {
      height: 1px;
      background: #1e1e2a;
      margin: 0 16px;
    }

    .tip {
      padding: 12px 16px;
      font-size: 11px;
      color: #6b7280;
      line-height: 1.6;
    }

    .tip span {
      color: #a78bfa;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Lumen" />
    <div class="header-text">
      <h1>Lumen Browser</h1>
      <p>Browser control bridge</p>
    </div>
  </div>

  <div class="status-section">
    <div class="status-row">
      <div class="dot checking" id="dot"></div>
      <span class="status-label" id="status-label">Checking…</span>
    </div>
    <div class="status-sub" id="status-sub"></div>
  </div>

  <div class="divider"></div>

  <div class="tip">
    Ask Lumen: <span>"take a screenshot"</span> or <span>"what's on this page?"</span> to use browser tools.
  </div>

  <script src="popup.js"></script>
</body>
</html>
